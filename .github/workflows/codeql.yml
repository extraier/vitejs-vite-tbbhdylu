# CodeQL — GitHub's free security scanner for JS/TS
# ===================================================
# Scans for:
#   - SQL injection (we don't use SQL, but Firestore rule bypasses count)
#   - XSS via React props
#   - Hardcoded secrets (catches the AI-leaked API key class of bugs)
#   - Insecure randomness (e.g. Math.random() used for tokens — yes, this
#     app does that for guestId; CodeQL will flag it)
#   - Prototype pollution
#
# Runs weekly + on every push to main. Results appear under the Security tab.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run at 06:00 UTC every Monday
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write  # required to upload SARIF

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Bundled queries include security-and-quality. Add extra packs:
          queries: security-and-quality
          # Disable security-extended for now if too noisy
          # queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}