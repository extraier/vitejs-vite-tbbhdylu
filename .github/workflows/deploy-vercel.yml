# Deploy to Vercel on main push
# ==============================
# Auto-deploys the production build. Vercel also gets a Preview URL for
# every PR via the GitHub App (configured separately).

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: false  # don't cancel a deploy mid-flight

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      # The official Vercel GitHub Action handles build + deploy.
      # Required secrets (configured in repo Settings → Secrets):
      #   VERCEL_TOKEN      — Personal token from vercel.com/account/tokens
      #   VERCEL_ORG_ID     — Your Vercel team/org ID
      #   VERCEL_PROJECT_ID — The project ID for this app
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (so build has the same vars as local dev)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}